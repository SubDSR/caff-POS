{% load cafeteria_extras %}
<div class="bg-white border-b border-[#6F4E37]/20 px-6 py-4">
  <div class="flex items-center gap-3 overflow-x-auto">
    <a href="{{ all_products_url }}" class="flex items-center gap-2 px-6 py-3 rounded-lg transition-all whitespace-nowrap {% if not selected_category %}bg-[#6F4E37] text-white shadow-lg{% else %}bg-white border-2 border-[#6F4E37]/20 text-[#3C2415] hover:border-[#6F4E37]/40{% endif %}">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
      <span>Todos los Productos</span>
    </a>

    {% for category in categories %}
      <a href="{{ category_urls|get_item:category }}" class="flex items-center gap-2 px-6 py-3 rounded-lg transition-all whitespace-nowrap {% if selected_category == category %}bg-[#6F4E37] text-white shadow-lg{% else %}bg-white border-2 border-[#6F4E37]/20 text-[#3C2415] hover:border-[#6F4E37]/40{% endif %}">
        {% include 'cafeteria/atoms/category_icon.html' with category=category size_class='w-5 h-5' %}
        <span>{{ category }}</span>
      </a>
    {% endfor %}
  </div>
</div>
