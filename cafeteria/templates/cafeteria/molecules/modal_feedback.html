{% if modal_feedback %}
  <div class="mb-4 p-3 rounded-lg flex items-center gap-2 {% if modal_feedback.type == 'success' %}bg-green-100 text-green-800{% elif modal_feedback.type == 'error' %}bg-red-100 text-red-800{% else %}bg-yellow-100 text-yellow-800{% endif %}">
    <span>{{ modal_feedback.text }}</span>
  </div>
{% endif %}
