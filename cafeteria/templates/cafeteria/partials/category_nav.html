{% load cafeteria_extras %}
<div class="bg-white border-b border-[#6F4E37]/20 px-6 py-4">
  <div class="flex items-center gap-3 overflow-x-auto">
    <a href="{{ all_products_url }}" class="flex items-center gap-2 px-6 py-3 rounded-lg transition-all whitespace-nowrap {% if not selected_category %}bg-[#6F4E37] text-white shadow-lg{% else %}bg-white border-2 border-[#6F4E37]/20 text-[#3C2415] hover:border-[#6F4E37]/40{% endif %}">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
      <span>Todos los Productos</span>
    </a>

    {% for category in categories %}
      <a href="{{ category_urls|get_item:category }}" class="flex items-center gap-2 px-6 py-3 rounded-lg transition-all whitespace-nowrap {% if selected_category == category %}bg-[#6F4E37] text-white shadow-lg{% else %}bg-white border-2 border-[#6F4E37]/20 text-[#3C2415] hover:border-[#6F4E37]/40{% endif %}">
        {% if category == 'Cafés' %}
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 8h1a4 4 0 1 1 0 8h-1"></path><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"></path><line x1="6" y1="2" x2="6" y2="4"></line><line x1="10" y1="2" x2="10" y2="4"></line><line x1="14" y1="2" x2="14" y2="4"></line></svg>
        {% elif category == 'Bebidas Frías' %}
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 2h8"></path><path d="M9 2v2.4a5 5 0 0 1-.7 2.5L5 12.5A6 6 0 0 0 10.1 22h3.8A6 6 0 0 0 19 12.5l-3.3-5.6a5 5 0 0 1-.7-2.5V2"></path></svg>
        {% elif category == 'Snacks' %}
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2c4.4 0 8 3.1 8 7 0 2.1-1.1 3.9-2.8 5.2-.5.4-.8 1-.8 1.6V18a4 4 0 0 1-8 0v-2.2c0-.6-.3-1.2-.8-1.6C5.1 12.9 4 11.1 4 9c0-3.9 3.6-7 8-7Z"></path></svg>
        {% else %}
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 11h18"></path><path d="M12 2v9"></path><path d="m5 11 1.4 7a2 2 0 0 0 2 1.6h7.2a2 2 0 0 0 2-1.6L19 11"></path></svg>
        {% endif %}
        <span>{{ category }}</span>
      </a>
    {% endfor %}
  </div>
</div>
