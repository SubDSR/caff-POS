<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md mx-4">
    <div class="flex items-center justify-between px-6 py-4 border-b border-[#6F4E37]/20">
      <h3 class="text-[#3C2415] font-semibold">Aplicar Descuento</h3>
      <a href="{{ base_state_url }}" class="text-[#6F4E37]/50 hover:text-[#6F4E37]" aria-label="Cerrar modal de descuento">
        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </a>
    </div>

    <form method="post" action="{% url 'cafeteria:apply_discount' %}" class="px-6 py-4">
      {% csrf_token %}
      <input type="hidden" name="q" value="{{ search_query }}">
      {% if selected_category %}<input type="hidden" name="category" value="{{ selected_category }}">{% endif %}
      <input type="hidden" name="modal" value="discount">

      <div class="mb-4">
        <label for="discount" class="block text-[#3C2415] mb-2">Porcentaje de Descuento</label>
        <div class="relative">
          <input id="discount" name="discount_custom" type="number" value="{{ discount|floatformat:2 }}" class="w-full px-4 py-3 rounded-lg border border-[#6F4E37]/30 focus:outline-none focus:ring-2 focus:ring-[#6F4E37] bg-white" placeholder="0" inputmode="decimal" min="0" max="100" step="0.01" required>
          <span class="absolute right-4 top-1/2 -translate-y-1/2 text-[#6F4E37]/70">%</span>
        </div>
      </div>

      <div class="mb-4">
        <p class="text-sm text-[#3C2415] mb-2">Descuentos rápidos:</p>
        <div class="grid grid-cols-3 gap-2">
          {% for preset in preset_discounts %}
            <div>
              <input id="preset-discount-{{ preset }}" type="radio" name="preset_discount" value="{{ preset }}" class="discount-preset-input" {% if discount == preset %}checked{% endif %}>
              <label for="preset-discount-{{ preset }}" class="discount-preset-option px-4 py-2 bg-[#f5f5f5] hover:bg-[#6F4E37] hover:text-white rounded-lg border border-[#6F4E37]/20 transition-colors">{{ preset }}%</label>
            </div>
          {% endfor %}
        </div>
      </div>

      {% if modal_feedback %}
        <div class="mb-4 p-3 rounded-lg flex items-center gap-2 {% if modal_feedback.type == 'success' %}bg-green-100 text-green-800{% elif modal_feedback.type == 'error' %}bg-red-100 text-red-800{% else %}bg-yellow-100 text-yellow-800{% endif %}">
          <span>{{ modal_feedback.text }}</span>
        </div>
      {% endif %}

      <div class="flex gap-2">
        <button formaction="{% url 'cafeteria:remove_discount' %}" formmethod="post" formnovalidate class="flex-1 px-4 py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg transition-colors">Quitar Descuento</button>
        <button type="submit" class="flex-1 bg-[#6F4E37] hover:bg-[#5a3d2b] text-white py-3 rounded-lg transition-colors">Aplicar</button>
      </div>
    </form>
  </div>
</div>
